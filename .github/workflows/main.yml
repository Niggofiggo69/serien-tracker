name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Richten wir Flutter ein
      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6' 
          channel: 'stable'

      # Hier zwingen wir das System, Flutter global zu erkennen
      - name: Flutter in PATH registrieren
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      - name: Android SDK Lizenzen akzeptieren
        run: yes | sdkmanager --licenses || true

      - name: Flet CLI & Abhängigkeiten installieren
        run: |
          pip install flet==0.85.1

      # Jetzt ganz normal ohne den fehlerhaften Parameter
      - name: APK builden
        run: |
          flet build apk

      - name: APK als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: serien-tracker-apk
          path: build/apk/*.apk
